<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for env(safe-area-inset-*) to be non-zero.
         interactiveWidget makes the pre-hydration frame correct on Chrome Android;
         iOS needs the visualViewport hook regardless (see useViewportHeight.js). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0f1220" />
    <!-- Resolve the theme before first paint so there's no flash of the wrong
         palette. Mirrors src/state/useTheme.js: the stored value is a
         *preference* ('light' | 'dark' | absent = follow the device), while
         <html data-theme> is always the resolved light|dark the CSS keys off.
         Keep the key and the two colours in sync with useTheme.js / app.css. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('leapword:v1:theme')
          var resolved =
            pref === 'light' || pref === 'dark'
              ? pref
              : matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          document.documentElement.dataset.theme = resolved
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', resolved === 'light' ? '#f2f4fb' : '#0f1220')
        } catch (e) {}
      })()
    </script>
    <title>Leapword — daily word ladder</title>
    <meta
      name="description"
      content="Climb from one word to another, one letter at a time. A new word ladder every day."
    />
    <link rel="canonical" href="https://leapword.app/" />

    <!-- Static, so every share unfurls the same card; your score travels in the
         share text, not in here. Crawlers don't run JS, which is why these are
         hand-written tags and why og:image must be an absolute URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Leapword" />
    <meta property="og:title" content="Leapword — daily word ladder" />
    <meta
      property="og:description"
      content="Climb from one word to another, one letter at a time. A new word ladder every day."
    />
    <meta property="og:url" content="https://leapword.app/" />
    <meta property="og:image" content="https://leapword.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Leapword — a daily word ladder puzzle" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
