<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for env(safe-area-inset-*) to be non-zero.
         interactiveWidget makes the pre-hydration frame correct on Chrome Android;
         iOS needs the visualViewport hook regardless (see useViewportHeight.js). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactiveWidget=resizes-content"
    />
    <meta name="theme-color" content="#0f1220" />
    <title>Leaprung — daily word ladder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
