<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Leaprung">
  <!-- Four rungs climbing bottom-left to top-right: the ladder, and the climb.
       Colours are src/styles/app.css tokens — --accent start, --leap for the one
       leap rung, --win end. Deliberately no lettering: it has to survive 16px. -->
  <rect width="64" height="64" rx="14" fill="#0f1220" />
  <rect x="7" y="43" width="14" height="14" rx="3.5" fill="#6ea8fe" />
  <rect x="21" y="30" width="14" height="14" rx="3.5" fill="#eef0f8" opacity="0.28" />
  <rect x="35" y="17" width="14" height="14" rx="3.5" fill="#b98cff" />
  <rect x="43" y="6" width="14" height="14" rx="3.5" fill="#57cc8a" />
</svg>
